name: quran
description: "قرآن — Quran companion mobile app (Mushaf reader + per-ayah audio + downloads + azkar)."
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0

  # DI + Routing
  flutter_modular: ^6.3.4

  # Local storage (per CLAUDE.md: hive_ce)
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.0.1

  # Audio
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.21

  # Networking + downloads
  dio: ^5.7.0
  flutter_cache_manager: ^3.4.1

  # File system
  path_provider: ^2.1.5
  path: ^1.9.0
  crypto: ^3.0.6

  # Utilities
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  rxdart: ^0.28.0
  collection: ^1.18.0
  uuid: ^4.5.1

  # Share / clipboard
  share_plus: ^10.1.2

  # UI helpers
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  toastification: ^2.3.0

  # i18n
  localize_and_translate: ^6.0.8
  intl: ^0.20.2

  # Logging / diagnostics
  talker: ^4.4.1
  talker_flutter: ^4.4.1
  talker_dio_logger: ^4.4.1

  # Platform utils
  package_info_plus: ^8.1.2
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.1

  # In-app web view — embeds the Haramain live YouTube streams (see modules/live).
  # The platform packages are pulled in explicitly so the live screen can enable
  # iOS inline playback (wkwebview) and Android autoplay-without-gesture
  # (android), each without a referenced-package lint.
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.0.0
  webview_flutter_wkwebview: ^3.18.0

  # Notifications + permissions
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0

  # Location + prayer times
  # Prayer times come from the Aladhan remote API (see lib/modules/prayer);
  # geocoding resolves the country to pick the calculation method.
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Qibla compass + tasbih haptics
  flutter_compass: ^0.8.1
  vibration: ^3.1.3

  # Markdown rendering for legal pages
  flutter_markdown: ^0.7.4+1
  android_alarm_manager_plus: ^5.0.0
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  hive_ce_generator: ^1.7.2
  json_serializable: ^6.8.0
  flutter_gen_runner: ^5.8.0

  # Native splash + launcher icon generators (config below).
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.0

# App launcher icons (run: dart run flutter_launcher_icons).
flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true

# Native splash: solid green, no logo, and no icon on the Android 12 splash
# (transparent image). The branded splash_screen.png is shown by SNSplash for
# 1s once Flutter is up. Run: dart run flutter_native_splash:create.
flutter_native_splash:
  color: "#0D7E5E"
  android: true
  ios: true
  web: false
  android_12:
    color: "#0D7E5E"
    image: assets/images/transparent.png

flutter_gen:
  output: lib/core/assets
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/
    - assets/data/mushaf_pages/
    - assets/data/mushaf_v4/
    - assets/data/tajweed/
    - assets/data/azkar/
    - assets/data/khatma/
    - assets/audio/adhan/
    - assets/fonts/qpc/
    - assets/fonts/qpc_v4/
    - assets/fonts/uthmani/
    - assets/images/
    - assets/icons/
    - assets/lang/
    - assets/mock/
    - assets/legal/

  # Uthmani text font for Tajweed mode (Approach B). Unlike the per-page QPC
  # glyph fonts (loaded at runtime by DSQpcFontLoader), this is an ordinary
  # Arabic text font, declared statically so the tajweed renderer can colour
  # each token itself. AmiriQuran — SIL OFL 1.1 (see assets/fonts/uthmani/OFL.txt).
  fonts:
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/uthmani/AmiriQuran.ttf
